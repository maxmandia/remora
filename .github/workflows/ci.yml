name: CI

on:
  push:
    branches:
      - staging
      - main
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Typecheck and test
    runs-on: ubuntu-latest
    # Run migrations against a disposable database during PR validation. The separate
    # migrate job below applies them to staging or production only after merge.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remora
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: remora
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d remora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Check database migrations
        run: pnpm db:check

      - name: Test database migration runner
        run: pnpm test:db-migrate

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Verify canonical model catalog
        run: pnpm model:verify

      - name: Test workspace
        run: pnpm test

  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: quality
    if: >-
      github.event_name == 'push' &&
      (
        github.ref_name == 'staging' ||
        github.ref_name == 'main'
      )
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    concurrency:
      group: db-migrate-${{ github.ref_name == 'main' && 'production' || 'staging' }}
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate
