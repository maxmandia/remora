name: Promote staging to main

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promote-staging-to-main
  cancel-in-progress: true

jobs:
  promote:
    name: Open staging promotion PR
    runs-on: ubuntu-latest

    steps:
      - name: Create or update staging promotion PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = 'chore: promote staging to main';
            const body = [
              'This PR promotes the latest changes from `staging` into `main`.',
              '',
              'It is opened and updated automatically whenever commits land on `staging`.',
            ].join('\n');
            const { owner, repo } = context.repo;

            const openPullRequests = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:staging`,
              base: 'main',
              per_page: 100,
            });

            if (openPullRequests.length > 1) {
              core.setFailed(
                `Found ${openPullRequests.length} open staging-to-main PRs. Close the duplicates before retrying.`,
              );
              return;
            }

            const existingPullRequest = openPullRequests[0];

            if (existingPullRequest) {
              if (existingPullRequest.title !== title) {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPullRequest.number,
                  title,
                });
                core.notice(`Normalized PR #${existingPullRequest.number} title to "${title}".`);
              } else {
                core.notice(`PR #${existingPullRequest.number} already promotes staging to main.`);
              }

              return;
            }

            const { data: pullRequest } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: 'staging',
              base: 'main',
              body,
              draft: false,
            });

            core.notice(`Created staging promotion PR #${pullRequest.number}.`);
