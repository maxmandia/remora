name: Desktop Release

on:
  deployment_status:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.release.tag_name || github.event.deployment.environment || github.event.workflow_run.head_branch || github.ref }}-${{ github.event.release.target_commitish || github.event.deployment.sha || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish desktop release
    runs-on: macos-26
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'release' &&
        github.event.action == 'published' &&
        startsWith(github.event.release.tag_name, 'desktop-v') &&
        !github.event.release.prerelease
      ) ||
      (
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.creator.login == 'railway-app[bot]' &&
        (
          github.event.deployment.environment == 'Remora / staging' ||
          github.event.deployment.environment == 'Remora / production'
        )
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'staging' ||
          github.event.workflow_run.head_branch == 'main'
        )
      )
    env:
      ARCH: arm64
      PLATFORM: darwin
      FORCE_COLOR: "1"
      RELEASE_EVENT_ENVIRONMENT: ${{ github.event.deployment.environment || '' }}
      RELEASE_EVENT_TAG: ${{ github.event.release.tag_name || '' }}
      RELEASE_WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      DESKTOP_RELEASE_R2_BUCKET: ${{ vars.DESKTOP_RELEASE_R2_BUCKET }}
      DESKTOP_RELEASE_PUBLIC_BASE_URL: ${{ vars.DESKTOP_RELEASE_PUBLIC_BASE_URL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      STAGING_API_PUBLIC_ORIGIN: ${{ vars.STAGING_API_PUBLIC_ORIGIN }}
      STAGING_WEB_ORIGIN: ${{ vars.STAGING_WEB_ORIGIN }}
      PRODUCTION_API_PUBLIC_ORIGIN: ${{ vars.PRODUCTION_API_PUBLIC_ORIGIN }}
      PRODUCTION_WEB_ORIGIN: ${{ vars.PRODUCTION_WEB_ORIGIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.deployment.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve desktop release channel
        id: release
        shell: bash
        run: |
          set -euo pipefail

          release_commit_sha="$(git rev-parse HEAD)"

          case "${GITHUB_EVENT_NAME}" in
            deployment_status)
              case "${RELEASE_EVENT_ENVIRONMENT}" in
                "Remora / staging")
                  channel="nightly"
                  source_branch="staging"
                  app_slug="Remora-Nightly"
                  api_origin="${STAGING_API_PUBLIC_ORIGIN}"
                  web_origin="${STAGING_WEB_ORIGIN}"
                  prerelease="true"
                  release_title="Remora Nightly"
                  ;;
                "Remora / production")
                  channel="stable"
                  source_branch="main"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported Railway environment: ${RELEASE_EVENT_ENVIRONMENT}" >&2
                  exit 1
                  ;;
              esac
              ;;
            workflow_run)
              source_branch="${RELEASE_WORKFLOW_BRANCH#refs/heads/}"
              case "${source_branch}" in
                staging)
                  channel="nightly"
                  app_slug="Remora-Nightly"
                  api_origin="${STAGING_API_PUBLIC_ORIGIN}"
                  web_origin="${STAGING_WEB_ORIGIN}"
                  prerelease="true"
                  release_title="Remora Nightly"
                  ;;
                main)
                  channel="stable"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported CI branch for release: ${source_branch}" >&2
                  exit 1
                  ;;
              esac
              ;;
            release)
              case "${RELEASE_EVENT_TAG}" in
                desktop-v*)
                  channel="stable"
                  source_branch="main"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported release tag: ${RELEASE_EVENT_TAG}" >&2
                  exit 1
                  ;;
              esac
              ;;
            workflow_dispatch)
              source_branch="${GITHUB_REF_NAME#refs/heads/}"
              case "${source_branch}" in
                staging)
                  channel="nightly"
                  app_slug="Remora-Nightly"
                  api_origin="${STAGING_API_PUBLIC_ORIGIN}"
                  web_origin="${STAGING_WEB_ORIGIN}"
                  prerelease="true"
                  release_title="Remora Nightly"
                  ;;
                main)
                  channel="stable"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported branch for manual release: ${source_branch}" >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          : "${release_commit_sha:?Missing release commit SHA}"
          : "${api_origin:?Missing API origin for ${channel}}"
          : "${web_origin:?Missing web origin for ${channel}}"
          : "${DESKTOP_RELEASE_R2_BUCKET:?Missing DESKTOP_RELEASE_R2_BUCKET variable}"
          : "${DESKTOP_RELEASE_PUBLIC_BASE_URL:?Missing DESKTOP_RELEASE_PUBLIC_BASE_URL variable}"
          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID secret or variable}"

          base_version="$(node -p "require('./apps/desktop/package.json').version")"
          short_sha="${release_commit_sha::7}"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [[ "${channel}" == "stable" ]]; then
            release_version="${base_version}"
            release_tag="desktop-v${base_version}"
            sentry_environment="production"
          else
            release_version="${base_version}-${channel}.${short_sha}"
            release_tag="desktop-${channel}-${short_sha}"
            sentry_environment="staging"
          fi

          if [[ -n "${RELEASE_EVENT_TAG}" && "${RELEASE_EVENT_TAG}" != "${release_tag}" ]]; then
            echo "Release tag ${RELEASE_EVENT_TAG} does not match desktop package version tag ${release_tag}." >&2
            exit 1
          fi

          artifact_name="${app_slug}-${PLATFORM}-${ARCH}.zip"
          immutable_key="${channel}/${PLATFORM}/${ARCH}/${release_version}/${artifact_name}"
          latest_key="${channel}/${PLATFORM}/${ARCH}/${artifact_name}"
          latest_manifest_key="${channel}/${PLATFORM}/${ARCH}/latest.json"
          public_base_url="${DESKTOP_RELEASE_PUBLIC_BASE_URL%/}"

          {
            echo "DESKTOP_CHANNEL=${channel}"
            echo "API_PUBLIC_ORIGIN=${api_origin}"
            echo "WEB_ORIGIN=${web_origin}"
            echo "RELEASE_COMMIT_SHA=${release_commit_sha}"
            echo "RELEASE_SOURCE_BRANCH=${source_branch}"
            echo "RELEASE_VERSION=${release_version}"
            echo "RELEASE_TAG=${release_tag}"
            echo "RELEASE_TITLE=${release_title}"
            echo "RELEASE_PRERELEASE=${prerelease}"
            echo "SENTRY_ENVIRONMENT=${sentry_environment}"
            echo "SENTRY_RELEASE=${release_version}"
            echo "ARTIFACT_NAME=${artifact_name}"
            echo "IMMUTABLE_KEY=${immutable_key}"
            echo "LATEST_KEY=${latest_key}"
            echo "LATEST_MANIFEST_KEY=${latest_manifest_key}"
            echo "PUBLIC_BASE_URL=${public_base_url}"
            echo "PUBLISHED_AT=${published_at}"
          } >> "${GITHUB_ENV}"

          {
            echo "channel=${channel}"
            echo "release_commit_sha=${release_commit_sha}"
            echo "release_version=${release_version}"
            echo "release_tag=${release_tag}"
            echo "artifact_name=${artifact_name}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Evaluate desktop release scope
        id: release_scope
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_COMMIT_SHA}" \
            --jq ".files[].filename" > changed-files.txt

          node <<'NODE'
          const fs = require("node:fs");

          const files = fs
            .readFileSync("changed-files.txt", "utf8")
            .split(/\r?\n/)
            .filter(Boolean);

          const rootBuildFiles = new Set([
            ".npmrc",
            "package.json",
            "pnpm-lock.yaml",
            "pnpm-workspace.yaml",
            "tsconfig.base.json",
            "tsconfig.json",
          ]);

          const desktopReleaseFiles = new Set([
            ".github/workflows/desktop-release.yml",
            "apps/backend/src/types.ts",
            "apps/web/src/lib/auth-client.ts",
            "apps/web/src/lib/electron-auth.ts",
            "apps/web/src/lib/credit-checkout-redirect.ts",
            "apps/web/src/routes/sign-in.tsx",
            "apps/web/src/routes/sign-up.tsx",
          ]);

          const startsWithAny = (file, prefixes) =>
            prefixes.some((prefix) => file.startsWith(prefix));

          const isDesktopReleaseFile = (file) =>
            rootBuildFiles.has(file) ||
            desktopReleaseFiles.has(file) ||
            startsWithAny(file, [
              "apps/desktop/",
              "packages/env/",
              "packages/domain/",
              "packages/form/",
              "packages/realtime/",
              "packages/ui/",
              "packages/utils/",
              "apps/backend/src/trpc/",
              "apps/backend/src/modules/auth/",
            ]) ||
            /^apps\/backend\/src\/modules\/.*\.(router|types)\.ts$/.test(file);

          const isRailwayFile = (file) =>
            rootBuildFiles.has(file) ||
            startsWithAny(file, [
              "apps/backend/",
              "apps/web/",
              "packages/domain/",
              "packages/env/",
              "packages/form/",
              "packages/realtime/",
              "packages/ui/",
              "packages/utils/",
              "infra/caddy/",
              "infra/observability/grafana/",
              "infra/observability/otel-collector/",
              "infra/observability/tempo/",
            ]);

          const writeOutput = (key, value) => {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          };

          const finish = (skip, reason) => {
            console.log(reason);
            writeOutput("skip", String(skip));
            writeOutput("reason", reason);
            process.exit(0);
          };

          const desktopReleaseNeeded = files.some(isDesktopReleaseFile);
          const railwayDeploymentNeeded = files.some(isRailwayFile);

          if (!desktopReleaseNeeded) {
            finish(true, "No desktop release paths changed.");
          }

          if (
            ["release", "workflow_run"].includes(process.env.GITHUB_EVENT_NAME) &&
            railwayDeploymentNeeded
          ) {
            finish(true, "Waiting for Railway deployment success.");
          }

          finish(false, "Desktop release paths changed.");
          NODE

      - name: Install dependencies
        if: steps.release_scope.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Check desktop release target
        if: steps.release_scope.outputs.skip != 'true'
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${DESKTOP_CHANNEL}" == "stable" ]]; then
            if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "Stable Release Please release ${RELEASE_TAG} does not exist; skipping publish."
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            tag_sha="$(git rev-parse "${RELEASE_TAG}^{commit}")"

            if [[ "${tag_sha}" != "${RELEASE_COMMIT_SHA}" ]]; then
              echo "Stable release ${RELEASE_TAG} points to ${tag_sha}, not ${RELEASE_COMMIT_SHA}; skipping publish."
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Desktop release ${RELEASE_TAG} already exists; skipping publish."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build desktop artifact
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf apps/desktop/out
          pnpm --filter @remora/desktop exec electron-forge make --arch="${ARCH}"

      - name: Prepare release files
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          zip_path="$(find apps/desktop/out/make/zip/darwin/arm64 -maxdepth 1 -name "*.zip" -print -quit)"
          if [[ -z "${zip_path}" ]]; then
            echo "No desktop ZIP artifact found." >&2
            exit 1
          fi

          mkdir -p desktop-release
          cp "${zip_path}" "desktop-release/${ARTIFACT_NAME}"

          sha256="$(shasum -a 256 "desktop-release/${ARTIFACT_NAME}" | awk '{print $1}')"
          echo "${sha256}  ${ARTIFACT_NAME}" > "desktop-release/${ARTIFACT_NAME}.sha256"
          echo "ARTIFACT_SHA256=${sha256}" >> "${GITHUB_ENV}"

          node <<'NODE'
          const fs = require("node:fs");

          const manifest = {
            channel: process.env.DESKTOP_CHANNEL,
            version: process.env.RELEASE_VERSION,
            commit: process.env.RELEASE_COMMIT_SHA,
            branch: process.env.RELEASE_SOURCE_BRANCH,
            publishedAt: process.env.PUBLISHED_AT,
            platform: process.env.PLATFORM,
            arch: process.env.ARCH,
            zipUrl: `${process.env.PUBLIC_BASE_URL}/${process.env.IMMUTABLE_KEY}`,
            latestZipUrl: `${process.env.PUBLIC_BASE_URL}/${process.env.LATEST_KEY}`,
            sha256: process.env.ARTIFACT_SHA256,
            signed: false,
          };

          fs.writeFileSync(
            "desktop-release/latest.json",
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE

      - name: Publish public R2 artifacts
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID variable}"
          : "${DESKTOP_RELEASE_R2_BUCKET:?Missing DESKTOP_RELEASE_R2_BUCKET variable}"
          : "${DESKTOP_RELEASE_PUBLIC_BASE_URL:?Missing DESKTOP_RELEASE_PUBLIC_BASE_URL variable}"

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${IMMUTABLE_KEY}" \
            --file "desktop-release/${ARTIFACT_NAME}" \
            --content-type "application/zip" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${IMMUTABLE_KEY}.sha256" \
            --file "desktop-release/${ARTIFACT_NAME}.sha256" \
            --content-type "text/plain; charset=utf-8" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${LATEST_KEY}" \
            --file "desktop-release/${ARTIFACT_NAME}" \
            --content-type "application/zip" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${LATEST_KEY}.sha256" \
            --file "desktop-release/${ARTIFACT_NAME}.sha256" \
            --content-type "text/plain; charset=utf-8" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${LATEST_MANIFEST_KEY}" \
            --file "desktop-release/latest.json" \
            --content-type "application/json; charset=utf-8" \
            --remote

      - name: Publish GitHub release assets
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${DESKTOP_CHANNEL}" == "stable" ]]; then
            gh release upload "${RELEASE_TAG}" \
              "desktop-release/${ARTIFACT_NAME}" \
              "desktop-release/${ARTIFACT_NAME}.sha256" \
              "desktop-release/latest.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            release_args=()
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              release_args+=(--prerelease)
            fi

            gh release create "${RELEASE_TAG}" \
              "desktop-release/${ARTIFACT_NAME}" \
              "desktop-release/${ARTIFACT_NAME}.sha256" \
              "desktop-release/latest.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${RELEASE_COMMIT_SHA}" \
              --title "${RELEASE_TITLE} ${RELEASE_VERSION}" \
              --notes "Desktop ${DESKTOP_CHANNEL} build for ${RELEASE_COMMIT_SHA}." \
              "${release_args[@]}"
          fi
