name: Desktop Release

on:
  deployment_status:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event.release.target_commitish || github.event.deployment.sha || github.event.workflow_run.head_sha || github.sha }}-${{ github.event.release.tag_name || github.event.workflow_run.head_branch || github.ref_name || github.event.deployment.environment || 'unknown' }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish desktop release
    runs-on: macos-26
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'release' &&
        github.event.action == 'published' &&
        startsWith(github.event.release.tag_name, 'desktop-v') &&
        !github.event.release.prerelease
      ) ||
      (
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.creator.login == 'railway-app[bot]' &&
        (
          github.event.deployment.environment == 'Remora / staging' ||
          github.event.deployment.environment == 'Remora / production'
        )
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'staging' ||
          github.event.workflow_run.head_branch == 'main'
        )
      )
    env:
      ARCH: arm64
      PLATFORM: darwin
      FORCE_COLOR: "1"
      RELEASE_EVENT_ENVIRONMENT: ${{ github.event.deployment.environment || '' }}
      RELEASE_EVENT_TAG: ${{ github.event.release.tag_name || '' }}
      RELEASE_WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
      DESKTOP_RELEASE_R2_BUCKET: ${{ vars.DESKTOP_RELEASE_R2_BUCKET }}
      DESKTOP_RELEASE_PUBLIC_BASE_URL: ${{ vars.DESKTOP_RELEASE_PUBLIC_BASE_URL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      STAGING_API_PUBLIC_ORIGIN: ${{ vars.STAGING_API_PUBLIC_ORIGIN }}
      STAGING_WEB_ORIGIN: ${{ vars.STAGING_WEB_ORIGIN }}
      PRODUCTION_API_PUBLIC_ORIGIN: ${{ vars.PRODUCTION_API_PUBLIC_ORIGIN }}
      PRODUCTION_WEB_ORIGIN: ${{ vars.PRODUCTION_WEB_ORIGIN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.deployment.sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve desktop release channel
        id: release
        shell: bash
        run: |
          set -euo pipefail

          release_commit_sha="$(git rev-parse HEAD)"

          case "${GITHUB_EVENT_NAME}" in
            deployment_status)
              case "${RELEASE_EVENT_ENVIRONMENT}" in
                "Remora / staging")
                  channel="nightly"
                  source_branch="staging"
                  app_slug="Remora-Nightly"
                  api_origin="${STAGING_API_PUBLIC_ORIGIN}"
                  web_origin="${STAGING_WEB_ORIGIN}"
                  prerelease="true"
                  release_title="Remora Nightly"
                  ;;
                "Remora / production")
                  channel="stable"
                  source_branch="main"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported Railway environment: ${RELEASE_EVENT_ENVIRONMENT}" >&2
                  exit 1
                  ;;
              esac
              ;;
            workflow_run)
              source_branch="${RELEASE_WORKFLOW_BRANCH#refs/heads/}"
              case "${source_branch}" in
                staging)
                  channel="nightly"
                  app_slug="Remora-Nightly"
                  api_origin="${STAGING_API_PUBLIC_ORIGIN}"
                  web_origin="${STAGING_WEB_ORIGIN}"
                  prerelease="true"
                  release_title="Remora Nightly"
                  ;;
                main)
                  channel="stable"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported CI branch for release: ${source_branch}" >&2
                  exit 1
                  ;;
              esac
              ;;
            release)
              case "${RELEASE_EVENT_TAG}" in
                desktop-v*)
                  channel="stable"
                  source_branch="main"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported release tag: ${RELEASE_EVENT_TAG}" >&2
                  exit 1
                  ;;
              esac
              ;;
            workflow_dispatch)
              source_branch="${GITHUB_REF_NAME#refs/heads/}"
              case "${source_branch}" in
                staging)
                  channel="nightly"
                  app_slug="Remora-Nightly"
                  api_origin="${STAGING_API_PUBLIC_ORIGIN}"
                  web_origin="${STAGING_WEB_ORIGIN}"
                  prerelease="true"
                  release_title="Remora Nightly"
                  ;;
                main)
                  channel="stable"
                  app_slug="Remora"
                  api_origin="${PRODUCTION_API_PUBLIC_ORIGIN}"
                  web_origin="${PRODUCTION_WEB_ORIGIN}"
                  prerelease="false"
                  release_title="Remora"
                  ;;
                *)
                  echo "Unsupported branch for manual release: ${source_branch}" >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          : "${release_commit_sha:?Missing release commit SHA}"
          : "${api_origin:?Missing API origin for ${channel}}"
          : "${web_origin:?Missing web origin for ${channel}}"
          : "${DESKTOP_RELEASE_R2_BUCKET:?Missing DESKTOP_RELEASE_R2_BUCKET variable}"
          : "${DESKTOP_RELEASE_PUBLIC_BASE_URL:?Missing DESKTOP_RELEASE_PUBLIC_BASE_URL variable}"
          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID secret or variable}"

          base_version="$(node -p "require('./apps/desktop/package.json').version")"
          short_sha="${release_commit_sha::7}"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [[ "${channel}" == "stable" ]]; then
            release_version="${base_version}"
            release_tag="desktop-v${base_version}"
            sentry_environment="production"
          else
            release_version="$(
              BASE_VERSION="${base_version}" node <<'NODE'
              const baseVersion = process.env.BASE_VERSION;
              const runNumber = process.env.GITHUB_RUN_NUMBER;
              const baseMatch = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(baseVersion || "");

              if (!baseMatch) {
                throw new Error(`Desktop package version is not semver: ${baseVersion}`);
              }

              if (!/^\d+$/.test(runNumber || "")) {
                throw new Error(`GITHUB_RUN_NUMBER is not numeric: ${runNumber}`);
              }

              process.stdout.write(`${baseMatch[1]}.${baseMatch[2]}.${runNumber}`);
          NODE
            )"
            release_tag="desktop-${channel}-${short_sha}"
            sentry_environment="staging"
          fi

          if [[ -n "${RELEASE_EVENT_TAG}" && "${RELEASE_EVENT_TAG}" != "${release_tag}" ]]; then
            echo "Release tag ${RELEASE_EVENT_TAG} does not match desktop package version tag ${release_tag}." >&2
            exit 1
          fi

          dmg_artifact_name="${app_slug}-${PLATFORM}-${ARCH}.dmg"
          dmg_immutable_key="${channel}/${PLATFORM}/${ARCH}/${release_version}/${dmg_artifact_name}"
          dmg_latest_key="${channel}/${PLATFORM}/${ARCH}/${dmg_artifact_name}"
          latest_manifest_key="${channel}/${PLATFORM}/${ARCH}/latest.json"
          public_base_url="${DESKTOP_RELEASE_PUBLIC_BASE_URL%/}"

          {
            echo "DESKTOP_CHANNEL=${channel}"
            echo "API_PUBLIC_ORIGIN=${api_origin}"
            echo "WEB_ORIGIN=${web_origin}"
            echo "RELEASE_COMMIT_SHA=${release_commit_sha}"
            echo "RELEASE_SOURCE_BRANCH=${source_branch}"
            echo "RELEASE_VERSION=${release_version}"
            echo "RELEASE_TAG=${release_tag}"
            echo "RELEASE_TITLE=${release_title}"
            echo "RELEASE_PRERELEASE=${prerelease}"
            echo "SENTRY_ENVIRONMENT=${sentry_environment}"
            echo "SENTRY_RELEASE=${release_version}"
            echo "DMG_ARTIFACT_NAME=${dmg_artifact_name}"
            echo "DMG_IMMUTABLE_KEY=${dmg_immutable_key}"
            echo "DMG_LATEST_KEY=${dmg_latest_key}"
            echo "LATEST_MANIFEST_KEY=${latest_manifest_key}"
            echo "PUBLIC_BASE_URL=${public_base_url}"
            echo "PUBLISHED_AT=${published_at}"
          } >> "${GITHUB_ENV}"

          {
            echo "channel=${channel}"
            echo "release_commit_sha=${release_commit_sha}"
            echo "release_version=${release_version}"
            echo "release_tag=${release_tag}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Evaluate desktop release scope
        id: release_scope
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_COMMIT_SHA}" \
            --jq ".files[].filename" > changed-files.txt

          node <<'NODE'
          const fs = require("node:fs");

          const files = fs
            .readFileSync("changed-files.txt", "utf8")
            .split(/\r?\n/)
            .filter(Boolean);

          const rootBuildFiles = new Set([
            ".npmrc",
            "package.json",
            "pnpm-lock.yaml",
            "pnpm-workspace.yaml",
            "tsconfig.base.json",
            "tsconfig.json",
          ]);

          const desktopReleaseFiles = new Set([
            ".github/workflows/desktop-release.yml",
            "apps/backend/src/types.ts",
            "apps/web/src/lib/auth-client.ts",
            "apps/web/src/lib/electron-auth.ts",
            "apps/web/src/lib/credit-checkout-redirect.ts",
            "apps/web/src/routes/sign-in.tsx",
            "apps/web/src/routes/sign-up.tsx",
          ]);

          const startsWithAny = (file, prefixes) =>
            prefixes.some((prefix) => file.startsWith(prefix));

          const isDesktopReleaseFile = (file) =>
            rootBuildFiles.has(file) ||
            desktopReleaseFiles.has(file) ||
            startsWithAny(file, [
              "apps/desktop/",
              "packages/env/",
              "packages/domain/",
              "packages/form/",
              "packages/realtime/",
              "packages/ui/",
              "packages/utils/",
              "apps/backend/src/trpc/",
              "apps/backend/src/modules/auth/",
            ]) ||
            /^apps\/backend\/src\/modules\/.*\.(router|types)\.ts$/.test(file);

          const isRailwayFile = (file) =>
            rootBuildFiles.has(file) ||
            startsWithAny(file, [
              "apps/backend/",
              "apps/web/",
              "packages/domain/",
              "packages/env/",
              "packages/form/",
              "packages/realtime/",
              "packages/ui/",
              "packages/utils/",
              "infra/caddy/",
              "infra/observability/grafana/",
              "infra/observability/otel-collector/",
              "infra/observability/tempo/",
            ]);

          const writeOutput = (key, value) => {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${value}\n`);
          };

          const finish = (skip, reason) => {
            console.log(reason);
            writeOutput("skip", String(skip));
            writeOutput("reason", reason);
            process.exit(0);
          };

          const desktopReleaseNeeded = files.some(isDesktopReleaseFile);
          const railwayDeploymentNeeded = files.some(isRailwayFile);

          if (!desktopReleaseNeeded) {
            finish(true, "No desktop release paths changed.");
          }

          if (
            ["release", "workflow_run"].includes(process.env.GITHUB_EVENT_NAME) &&
            railwayDeploymentNeeded
          ) {
            finish(true, "Waiting for Railway deployment success.");
          }

          finish(false, "Desktop release paths changed.");
          NODE

      - name: Install dependencies
        if: steps.release_scope.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Check desktop release target
        if: steps.release_scope.outputs.skip != 'true'
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${DESKTOP_CHANNEL}" == "stable" ]]; then
            if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              echo "Stable Release Please release ${RELEASE_TAG} does not exist; skipping publish."
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            tag_sha="$(git rev-parse "${RELEASE_TAG}^{commit}")"

            if [[ "${tag_sha}" != "${RELEASE_COMMIT_SHA}" ]]; then
              echo "Stable release ${RELEASE_TAG} points to ${tag_sha}, not ${RELEASE_COMMIT_SHA}; skipping publish."
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Desktop release ${RELEASE_TAG} already exists; skipping publish."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare Apple signing credentials
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          set -euo pipefail

          : "${APPLE_CERTIFICATE_BASE64:?Missing APPLE_CERTIFICATE_BASE64 secret}"
          : "${APPLE_CERTIFICATE_PASSWORD:?Missing APPLE_CERTIFICATE_PASSWORD secret}"
          : "${APPLE_SIGNING_IDENTITY:?Missing APPLE_SIGNING_IDENTITY secret}"
          : "${APPLE_API_KEY_BASE64:?Missing APPLE_API_KEY_BASE64 secret}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID secret}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER secret}"

          signing_dir="${RUNNER_TEMP}/apple-signing"
          cert_path="${signing_dir}/certificate.p12"
          api_key_path="${signing_dir}/notarization-key.p8"
          keychain_path="${signing_dir}/remora-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"

          mkdir -p "${signing_dir}"
          chmod 700 "${signing_dir}"

          printf "%s" "${APPLE_CERTIFICATE_BASE64}" | base64 --decode > "${cert_path}"
          printf "%s" "${APPLE_API_KEY_BASE64}" | base64 --decode > "${api_key_path}"
          chmod 600 "${cert_path}" "${api_key_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"

          current_keychains="$(security list-keychains -d user | tr -d '"' | xargs || true)"
          if [[ -n "${current_keychains}" ]]; then
            security list-keychains -d user -s "${keychain_path}" ${current_keychains}
          else
            security list-keychains -d user -s "${keychain_path}"
          fi

          security import "${cert_path}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${keychain_path}"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"

          security find-identity -v -p codesigning "${keychain_path}"
          if ! security find-identity -v -p codesigning "${keychain_path}" | grep -F "${APPLE_SIGNING_IDENTITY}" >/dev/null; then
            echo "APPLE_SIGNING_IDENTITY was not found in the imported keychain." >&2
            exit 1
          fi

          {
            echo "APPLE_KEYCHAIN_PATH=${keychain_path}"
            echo "APPLE_API_KEY=${api_key_path}"
            echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID}"
            echo "APPLE_API_ISSUER=${APPLE_API_ISSUER}"
            echo "APPLE_SIGNING_IDENTITY=${APPLE_SIGNING_IDENTITY}"
          } >> "${GITHUB_ENV}"

      - name: Check Apple notarization queue
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 2
        shell: bash
        run: |
          set -euo pipefail

          : "${APPLE_API_KEY:?Missing APPLE_API_KEY}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER}"

          history_path="${RUNNER_TEMP}/notarization-history.json"
          xcrun notarytool history \
            --key "${APPLE_API_KEY}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --output-format json \
            | tee "${history_path}"

          HISTORY_PATH="${history_path}" node <<'NODE'
          const fs = require("node:fs");

          const history = JSON.parse(
            fs.readFileSync(process.env.HISTORY_PATH, "utf8"),
          );
          const inProgress = (history.history || []).filter(
            (submission) =>
              submission.status === "In Progress" &&
              typeof submission.name === "string" &&
              (submission.name.startsWith("Remora") ||
                submission.name.startsWith("notarization-desktop-")),
          );

          if (inProgress.length === 0) {
            process.exit(0);
          }

          console.error(
            `Apple already has ${inProgress.length} Remora notarization submission(s) in progress. Refusing to submit another archive.`,
          );
          for (const submission of inProgress) {
            console.error(
              `${submission.id} ${submission.status} ${submission.createdDate} ${submission.name}`,
            );
          }
          process.exit(1);
          NODE

      - name: Package signed desktop app
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 15
        env:
          DEBUG: >-
            electron-forge:*,
            electron-packager*,
            electron-osx-sign*,
            @electron/osx-sign*
        shell: bash
        run: |
          set -euo pipefail
          rm -rf apps/desktop/out
          echo "Starting Electron Forge package at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          pnpm --filter @remora/desktop exec electron-forge package --arch="${ARCH}" --platform="${PLATFORM}"
          echo "Finished Electron Forge package at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          app_paths="$(find apps/desktop/out -mindepth 2 -maxdepth 2 -type d -name "*.app" -print)"
          app_count="$(printf "%s\n" "${app_paths}" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "${app_count}" != "1" ]]; then
            echo "Expected exactly one packaged desktop app, found ${app_count}." >&2
            printf "%s\n" "${app_paths}" >&2
            exit 1
          fi

          app_path="$(printf "%s\n" "${app_paths}" | sed '/^$/d' | head -n 1)"
          echo "DESKTOP_APP_PATH=${app_path}" >> "${GITHUB_ENV}"

      - name: Submit app for notarization
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          : "${DESKTOP_APP_PATH:?Missing DESKTOP_APP_PATH}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER}"

          app_parent="$(dirname "${DESKTOP_APP_PATH}")"
          app_name="$(basename "${DESKTOP_APP_PATH}")"
          notary_archive_path="${RUNNER_TEMP}/notarization-${RELEASE_TAG}.zip"
          submit_result_path="${RUNNER_TEMP}/notarization-submit.json"

          rm -f "${notary_archive_path}" "${submit_result_path}"
          echo "Zipping ${app_name} for notarization at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          (
            cd "${app_parent}"
            ditto -c -k --sequesterRsrc --keepParent "${app_name}" "${notary_archive_path}"
          )

          echo "Submitting notarization archive at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          xcrun notarytool submit "${notary_archive_path}" \
            --key "${APPLE_API_KEY}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --output-format json \
            | tee "${submit_result_path}"

          submission_id="$(node -e "const fs = require('node:fs'); const result = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(result.id || '');" "${submit_result_path}")"
          if [[ -z "${submission_id}" ]]; then
            echo "Notarization submit did not return a submission id." >&2
            exit 1
          fi

          echo "Notarization submission id: ${submission_id}"
          echo "NOTARY_SUBMISSION_ID=${submission_id}" >> "${GITHUB_ENV}"

      - name: Wait for notarization
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 22
        shell: bash
        run: |
          set -euo pipefail

          : "${NOTARY_SUBMISSION_ID:?Missing NOTARY_SUBMISSION_ID}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER}"

          wait_result_path="${RUNNER_TEMP}/notarization-wait.json"
          notary_log_path="${RUNNER_TEMP}/notarization-log.json"
          notary_auth_args=(
            --key "${APPLE_API_KEY}"
            --key-id "${APPLE_API_KEY_ID}"
            --issuer "${APPLE_API_ISSUER}"
          )

          print_notary_info() {
            echo "Fetching notarization status for ${NOTARY_SUBMISSION_ID}..."
            xcrun notarytool info \
              "${notary_auth_args[@]}" \
              "${NOTARY_SUBMISSION_ID}" \
              --output-format json || true
          }

          print_notary_history() {
            echo "Fetching recent notarization history..."
            xcrun notarytool history \
              "${notary_auth_args[@]}" \
              --output-format json || true
          }

          fetch_notary_log() {
            echo "Fetching notarization log for ${NOTARY_SUBMISSION_ID}..."
            if xcrun notarytool log \
              "${notary_auth_args[@]}" \
              "${NOTARY_SUBMISSION_ID}" \
              "${notary_log_path}"; then
              cat "${notary_log_path}"
            else
              echo "No notarization log was available yet." >&2
            fi
          }

          echo "Waiting for notarization ${NOTARY_SUBMISSION_ID} at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          set +e
          xcrun notarytool wait "${NOTARY_SUBMISSION_ID}" \
            --key "${APPLE_API_KEY}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --timeout 20m \
            --output-format json \
            | tee "${wait_result_path}"
          wait_exit="${PIPESTATUS[0]}"
          set -e

          if [[ "${wait_exit}" != "0" ]]; then
            echo "notarytool wait failed or timed out with exit code ${wait_exit}." >&2
            print_notary_info
            print_notary_history
            fetch_notary_log
            exit "${wait_exit}"
          fi

          notarization_status="$(node -e "const fs = require('node:fs'); const result = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(result.status || '');" "${wait_result_path}")"
          if [[ "${notarization_status}" != "Accepted" ]]; then
            echo "Notarization finished with unexpected status: ${notarization_status}" >&2
            print_notary_info
            print_notary_history
            fetch_notary_log
            exit 1
          fi

      - name: Staple notarization ticket
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          : "${DESKTOP_APP_PATH:?Missing DESKTOP_APP_PATH}"

          xcrun stapler staple "${DESKTOP_APP_PATH}"
          xcrun stapler validate "${DESKTOP_APP_PATH}"

      - name: Make updater ZIP
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 10
        env:
          DEBUG: electron-forge:*
        shell: bash
        run: |
          set -euo pipefail

          echo "Starting Electron Forge make at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          pnpm --filter @remora/desktop exec electron-forge make --skip-package --arch="${ARCH}" --platform="${PLATFORM}"
          echo "Finished Electron Forge make at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Make installer DMG
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          : "${DESKTOP_APP_PATH:?Missing DESKTOP_APP_PATH}"
          : "${APPLE_SIGNING_IDENTITY:?Missing APPLE_SIGNING_IDENTITY}"
          : "${RELEASE_TITLE:?Missing RELEASE_TITLE}"

          app_path="$(cd "$(dirname "${DESKTOP_APP_PATH}")" && pwd)/$(basename "${DESKTOP_APP_PATH}")"
          make_dir="$(pwd)/apps/desktop/out/make"

          mkdir -p "${make_dir}"
          find "${make_dir}" -maxdepth 1 -type f -name "*.dmg" -delete

          echo "Starting create-dmg at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          pnpm --filter @remora/desktop exec create-dmg \
            "${app_path}" \
            "${make_dir}" \
            --overwrite \
            --no-version-in-filename \
            --dmg-title="${RELEASE_TITLE}" \
            --identity="${APPLE_SIGNING_IDENTITY}"
          echo "Finished create-dmg at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          dmg_paths="$(find apps/desktop/out/make -maxdepth 1 -type f -name "*.dmg" -print)"
          dmg_count="$(printf "%s\n" "${dmg_paths}" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "${dmg_count}" != "1" ]]; then
            echo "Expected exactly one desktop DMG artifact, found ${dmg_count}." >&2
            printf "%s\n" "${dmg_paths}" >&2
            exit 1
          fi

          dmg_path="$(printf "%s\n" "${dmg_paths}" | sed '/^$/d' | head -n 1)"
          echo "DESKTOP_DMG_PATH=${dmg_path}" >> "${GITHUB_ENV}"

      - name: Submit installer DMG for notarization
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 10
        shell: bash
        run: |
          set -euo pipefail

          : "${DESKTOP_DMG_PATH:?Missing DESKTOP_DMG_PATH}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER}"

          submit_result_path="${RUNNER_TEMP}/notarization-submit-dmg.json"

          rm -f "${submit_result_path}"
          echo "Submitting installer DMG at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          xcrun notarytool submit "${DESKTOP_DMG_PATH}" \
            --key "${APPLE_API_KEY}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --output-format json \
            | tee "${submit_result_path}"

          submission_id="$(node -e "const fs = require('node:fs'); const result = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(result.id || '');" "${submit_result_path}")"
          if [[ -z "${submission_id}" ]]; then
            echo "DMG notarization submit did not return a submission id." >&2
            exit 1
          fi

          echo "DMG notarization submission id: ${submission_id}"
          echo "DMG_NOTARY_SUBMISSION_ID=${submission_id}" >> "${GITHUB_ENV}"

      - name: Wait for installer DMG notarization
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        timeout-minutes: 22
        shell: bash
        run: |
          set -euo pipefail

          : "${DMG_NOTARY_SUBMISSION_ID:?Missing DMG_NOTARY_SUBMISSION_ID}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER}"

          wait_result_path="${RUNNER_TEMP}/notarization-wait-dmg.json"
          notary_log_path="${RUNNER_TEMP}/notarization-log-dmg.json"
          notary_auth_args=(
            --key "${APPLE_API_KEY}"
            --key-id "${APPLE_API_KEY_ID}"
            --issuer "${APPLE_API_ISSUER}"
          )

          print_notary_info() {
            echo "Fetching notarization status for ${DMG_NOTARY_SUBMISSION_ID}..."
            xcrun notarytool info \
              "${notary_auth_args[@]}" \
              "${DMG_NOTARY_SUBMISSION_ID}" \
              --output-format json || true
          }

          print_notary_history() {
            echo "Fetching recent notarization history..."
            xcrun notarytool history \
              "${notary_auth_args[@]}" \
              --output-format json || true
          }

          fetch_notary_log() {
            echo "Fetching notarization log for ${DMG_NOTARY_SUBMISSION_ID}..."
            if xcrun notarytool log \
              "${notary_auth_args[@]}" \
              "${DMG_NOTARY_SUBMISSION_ID}" \
              "${notary_log_path}"; then
              cat "${notary_log_path}"
            else
              echo "No notarization log was available yet." >&2
            fi
          }

          echo "Waiting for DMG notarization ${DMG_NOTARY_SUBMISSION_ID} at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          set +e
          xcrun notarytool wait "${DMG_NOTARY_SUBMISSION_ID}" \
            --key "${APPLE_API_KEY}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --timeout 20m \
            --output-format json \
            | tee "${wait_result_path}"
          wait_exit="${PIPESTATUS[0]}"
          set -e

          if [[ "${wait_exit}" != "0" ]]; then
            echo "notarytool wait failed or timed out with exit code ${wait_exit}." >&2
            print_notary_info
            print_notary_history
            fetch_notary_log
            exit "${wait_exit}"
          fi

          notarization_status="$(node -e "const fs = require('node:fs'); const result = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(result.status || '');" "${wait_result_path}")"
          if [[ "${notarization_status}" != "Accepted" ]]; then
            echo "DMG notarization finished with unexpected status: ${notarization_status}" >&2
            print_notary_info
            print_notary_history
            fetch_notary_log
            exit 1
          fi

      - name: Staple installer DMG notarization ticket
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          : "${DESKTOP_DMG_PATH:?Missing DESKTOP_DMG_PATH}"

          xcrun stapler staple "${DESKTOP_DMG_PATH}"
          xcrun stapler validate "${DESKTOP_DMG_PATH}"

      - name: Verify desktop signing and updater metadata
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          app_path="${DESKTOP_APP_PATH:-}"
          if [[ -z "${app_path}" ]]; then
            app_path="$(find apps/desktop/out -mindepth 2 -maxdepth 2 -type d -name "*.app" -print -quit)"
          fi

          if [[ -z "${app_path}" ]]; then
            echo "No packaged desktop app found." >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "${app_path}"
          spctl --assess --type execute --verbose "${app_path}"
          xcrun stapler validate "${app_path}"

          dmg_path="${DESKTOP_DMG_PATH:-}"
          if [[ -z "${dmg_path}" ]]; then
            dmg_paths="$(find apps/desktop/out/make -maxdepth 1 -type f -name "*.dmg" -print)"
            dmg_count="$(printf "%s\n" "${dmg_paths}" | sed '/^$/d' | wc -l | tr -d ' ')"
            if [[ "${dmg_count}" != "1" ]]; then
              echo "Expected exactly one desktop DMG artifact, found ${dmg_count}." >&2
              printf "%s\n" "${dmg_paths}" >&2
              exit 1
            fi

            dmg_path="$(printf "%s\n" "${dmg_paths}" | sed '/^$/d' | head -n 1)"
          fi

          xcrun stapler validate "${dmg_path}"
          spctl -a -t open --context context:primary-signature -v "${dmg_path}"

          releases_path="apps/desktop/out/make/zip/darwin/${ARCH}/RELEASES.json"
          if [[ ! -f "${releases_path}" ]]; then
            echo "No Electron update RELEASES.json found." >&2
            exit 1
          fi

      - name: Prepare release files
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          release_dir="apps/desktop/out/make/zip/darwin/${ARCH}"
          zip_path="$(find "${release_dir}" -maxdepth 1 -name "*.zip" -print -quit)"
          if [[ -z "${zip_path}" ]]; then
            echo "No desktop ZIP artifact found." >&2
            exit 1
          fi

          dmg_dir="apps/desktop/out/make"
          dmg_paths="$(find "${dmg_dir}" -maxdepth 1 -type f -name "*.dmg" -print)"
          dmg_count="$(printf "%s\n" "${dmg_paths}" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "${dmg_count}" != "1" ]]; then
            echo "Expected exactly one desktop DMG artifact, found ${dmg_count}." >&2
            printf "%s\n" "${dmg_paths}" >&2
            exit 1
          fi
          dmg_path="$(printf "%s\n" "${dmg_paths}" | sed '/^$/d' | head -n 1)"

          releases_path="${release_dir}/RELEASES.json"
          if [[ ! -f "${releases_path}" ]]; then
            echo "No Electron update RELEASES.json found." >&2
            exit 1
          fi

          mkdir -p desktop-release
          forge_artifact_name="$(basename "${zip_path}")"
          forge_artifact_key="${DESKTOP_CHANNEL}/${PLATFORM}/${ARCH}/${forge_artifact_name}"
          forge_releases_key="${DESKTOP_CHANNEL}/${PLATFORM}/${ARCH}/RELEASES.json"

          cp "${zip_path}" "desktop-release/${forge_artifact_name}"
          cp "${releases_path}" "desktop-release/RELEASES.json"
          cp "${dmg_path}" "desktop-release/${DMG_ARTIFACT_NAME}"

          dmg_sha256="$(shasum -a 256 "desktop-release/${DMG_ARTIFACT_NAME}" | awk '{print $1}')"
          echo "${dmg_sha256}  ${DMG_ARTIFACT_NAME}" > "desktop-release/${DMG_ARTIFACT_NAME}.sha256"
          echo "DMG_ARTIFACT_SHA256=${dmg_sha256}" >> "${GITHUB_ENV}"
          echo "FORGE_ARTIFACT_NAME=${forge_artifact_name}" >> "${GITHUB_ENV}"
          echo "FORGE_ARTIFACT_KEY=${forge_artifact_key}" >> "${GITHUB_ENV}"
          echo "FORGE_RELEASES_KEY=${forge_releases_key}" >> "${GITHUB_ENV}"

          export FORGE_ARTIFACT_NAME="${forge_artifact_name}"
          export FORGE_ARTIFACT_KEY="${forge_artifact_key}"
          export FORGE_RELEASES_KEY="${forge_releases_key}"
          export DMG_ARTIFACT_SHA256="${dmg_sha256}"

          node <<'NODE'
          const fs = require("node:fs");

          const publicUrl = (key) =>
            `${process.env.PUBLIC_BASE_URL}/${key
              .split("/")
              .map(encodeURIComponent)
              .join("/")}`;

          const manifest = {
            channel: process.env.DESKTOP_CHANNEL,
            version: process.env.RELEASE_VERSION,
            commit: process.env.RELEASE_COMMIT_SHA,
            branch: process.env.RELEASE_SOURCE_BRANCH,
            publishedAt: process.env.PUBLISHED_AT,
            platform: process.env.PLATFORM,
            arch: process.env.ARCH,
            dmgUrl: publicUrl(process.env.DMG_IMMUTABLE_KEY),
            latestDmgUrl: publicUrl(process.env.DMG_LATEST_KEY),
            updateZipUrl: publicUrl(process.env.FORGE_ARTIFACT_KEY),
            updateManifestUrl: publicUrl(process.env.FORGE_RELEASES_KEY),
            dmgSha256: process.env.DMG_ARTIFACT_SHA256,
            signed: true,
            notarized: true,
          };

          fs.writeFileSync(
            "desktop-release/latest.json",
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE

      - name: Publish public R2 artifacts
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID variable}"
          : "${DESKTOP_RELEASE_R2_BUCKET:?Missing DESKTOP_RELEASE_R2_BUCKET variable}"
          : "${DESKTOP_RELEASE_PUBLIC_BASE_URL:?Missing DESKTOP_RELEASE_PUBLIC_BASE_URL variable}"
          : "${PUBLIC_BASE_URL:?Missing PUBLIC_BASE_URL}"
          : "${FORGE_ARTIFACT_NAME:?Missing FORGE_ARTIFACT_NAME}"
          : "${FORGE_ARTIFACT_KEY:?Missing FORGE_ARTIFACT_KEY}"
          : "${FORGE_RELEASES_KEY:?Missing FORGE_RELEASES_KEY}"
          : "${DMG_ARTIFACT_NAME:?Missing DMG_ARTIFACT_NAME}"
          : "${DMG_IMMUTABLE_KEY:?Missing DMG_IMMUTABLE_KEY}"
          : "${DMG_LATEST_KEY:?Missing DMG_LATEST_KEY}"

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${DMG_IMMUTABLE_KEY}" \
            --file "desktop-release/${DMG_ARTIFACT_NAME}" \
            --content-type "application/x-apple-diskimage" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${DMG_IMMUTABLE_KEY}.sha256" \
            --file "desktop-release/${DMG_ARTIFACT_NAME}.sha256" \
            --content-type "text/plain; charset=utf-8" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${DMG_LATEST_KEY}" \
            --file "desktop-release/${DMG_ARTIFACT_NAME}" \
            --content-type "application/x-apple-diskimage" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${DMG_LATEST_KEY}.sha256" \
            --file "desktop-release/${DMG_ARTIFACT_NAME}.sha256" \
            --content-type "text/plain; charset=utf-8" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${FORGE_ARTIFACT_KEY}" \
            --file "desktop-release/${FORGE_ARTIFACT_NAME}" \
            --content-type "application/zip" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${FORGE_RELEASES_KEY}" \
            --file "desktop-release/RELEASES.json" \
            --content-type "application/json; charset=utf-8" \
            --remote

          pnpm dlx wrangler@latest r2 object put \
            "${DESKTOP_RELEASE_R2_BUCKET}/${LATEST_MANIFEST_KEY}" \
            --file "desktop-release/latest.json" \
            --content-type "application/json; charset=utf-8" \
            --remote

          published_releases_url="$(
            node <<'NODE'
            const publicUrl = (key) =>
              `${process.env.PUBLIC_BASE_URL}/${key
                .split("/")
                .map(encodeURIComponent)
                .join("/")}`;

            process.stdout.write(publicUrl(process.env.FORGE_RELEASES_KEY));
          NODE
          )"
          published_update_zip_url="$(
            node <<'NODE'
            const publicUrl = (key) =>
              `${process.env.PUBLIC_BASE_URL}/${key
                .split("/")
                .map(encodeURIComponent)
                .join("/")}`;

            process.stdout.write(publicUrl(process.env.FORGE_ARTIFACT_KEY));
          NODE
          )"
          published_dmg_url="$(
            node <<'NODE'
            const publicUrl = (key) =>
              `${process.env.PUBLIC_BASE_URL}/${key
                .split("/")
                .map(encodeURIComponent)
                .join("/")}`;

            process.stdout.write(publicUrl(process.env.DMG_LATEST_KEY));
          NODE
          )"
          published_releases_path="${RUNNER_TEMP}/published-RELEASES.json"

          curl \
            --fail \
            --location \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 2 \
            --show-error \
            --silent \
            "${published_releases_url}" \
            --output "${published_releases_path}"

          PUBLISHED_RELEASES_PATH="${published_releases_path}" \
          EXPECTED_RELEASE_VERSION="${RELEASE_VERSION}" \
          EXPECTED_UPDATE_ZIP_URL="${published_update_zip_url}" \
            node <<'NODE'
            const fs = require("node:fs");

            const feed = JSON.parse(
              fs.readFileSync(process.env.PUBLISHED_RELEASES_PATH, "utf8"),
            );

            if (feed.currentRelease !== process.env.EXPECTED_RELEASE_VERSION) {
              throw new Error(
                `Published RELEASES.json currentRelease was ${feed.currentRelease}, expected ${process.env.EXPECTED_RELEASE_VERSION}`,
              );
            }

            const release = (feed.releases || []).find(
              (release) =>
                release.version === process.env.EXPECTED_RELEASE_VERSION,
            );

            if (!release) {
              throw new Error(
                `Published RELEASES.json did not include ${process.env.EXPECTED_RELEASE_VERSION}`,
              );
            }

            if (release.updateTo?.url !== process.env.EXPECTED_UPDATE_ZIP_URL) {
              throw new Error(
                `Published update URL was ${release.updateTo?.url}, expected ${process.env.EXPECTED_UPDATE_ZIP_URL}`,
              );
            }
          NODE

          curl \
            --fail \
            --head \
            --location \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 2 \
            --show-error \
            --silent \
            "${published_update_zip_url}" \
            >/dev/null

          curl \
            --fail \
            --head \
            --location \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 2 \
            --show-error \
            --silent \
            "${published_dmg_url}" \
            >/dev/null

      - name: Publish GitHub release assets
        if: steps.release_scope.outputs.skip != 'true' && steps.existing_release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${DESKTOP_CHANNEL}" == "stable" ]]; then
            gh release upload "${RELEASE_TAG}" \
              "desktop-release/${DMG_ARTIFACT_NAME}" \
              "desktop-release/${DMG_ARTIFACT_NAME}.sha256" \
              "desktop-release/${FORGE_ARTIFACT_NAME}" \
              "desktop-release/RELEASES.json" \
              "desktop-release/latest.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            release_args=()
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              release_args+=(--prerelease)
            fi

            gh release create "${RELEASE_TAG}" \
              "desktop-release/${DMG_ARTIFACT_NAME}" \
              "desktop-release/${DMG_ARTIFACT_NAME}.sha256" \
              "desktop-release/${FORGE_ARTIFACT_NAME}" \
              "desktop-release/RELEASES.json" \
              "desktop-release/latest.json" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${RELEASE_COMMIT_SHA}" \
              --title "${RELEASE_TITLE} ${RELEASE_VERSION}" \
              --notes "Desktop ${DESKTOP_CHANNEL} build for ${RELEASE_COMMIT_SHA}." \
              "${release_args[@]}"
          fi

      - name: Clean up Apple signing credentials
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${APPLE_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${APPLE_KEYCHAIN_PATH}" || true
          fi

          rm -rf "${RUNNER_TEMP}/apple-signing"
