stream_over_http_enabled: true

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3200
  grpc_listen_address: 0.0.0.0
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

backend_scheduler:
  provider:
    compaction:
      compaction:
        block_retention: ${TEMPO_BLOCK_RETENTION}

backend_worker:
  compaction:
    block_retention: ${TEMPO_BLOCK_RETENTION}

storage:
  trace:
    backend: s3
    wal:
      path: /var/tempo/wal
    s3:
      bucket: ${TEMPO_S3_BUCKET}
      endpoint: ${TEMPO_S3_ENDPOINT}
      region: ${TEMPO_S3_REGION}
      access_key: ${TEMPO_S3_ACCESS_KEY_ID}
      secret_key: ${TEMPO_S3_SECRET_ACCESS_KEY}
      insecure: false
      forcepathstyle: true

usage_report:
  reporting_enabled: false
